<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Interactive Cards</title>

<style>
	*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#0f172a,#020617);
    color:#e2e8f0;
}

/* Background */

.background{
    position:relative;
    padding:20px;

    border-radius:14px;

    background:#020617;

    border:1px solid #1e293b;

    box-shadow:
        0 0 40px rgba(0,0,0,0.8),
        0 0 15px rgba(0,150,255,0.15);
}

.image img{
    max-width:100%;
    max-height:100%;
    border-radius:10px;
}

/* Card container */

.card{
    width:180px;
    height:60px;
    position:absolute;
    perspective:1000px;
    cursor:pointer;
}

/* Flip structure */

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform 0.8s;
    transform-style:preserve-3d;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

/* Front + back */

.card-face{
    width:100%;
    height:100%;
    border-radius:10px;
    position:absolute;
    backface-visibility:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:600;
}

/* Front */

.card-front{

    background:linear-gradient(
        135deg,
        #6366f1,
        #9333ea
    );

    color:white;

    font-size:28px;

    border:1px solid rgba(255,255,255,0.2);

    overflow:hidden;

    box-shadow:
        0 6px 12px rgba(0,0,0,0.4);
}

/* Shine effect */

.card-front::after{

    content:"";

    position:absolute;

    top:-100%;
    left:-120%;

    width:60%;
    height:300%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent
    );

    transform:rotate(25deg);

    transition:0.6s;
}

.card:hover .card-front{

    box-shadow:
        0 0 12px rgba(100,180,255,0.9),
        0 0 25px rgba(100,180,255,0.5);

    transform:translateY(-3px);
}

.card:hover .card-front::after{
    left:200%;
}

/* Back */

.card-back{

    background:linear-gradient(
        135deg,
        #14b8a6,
        #0ea5e9
    );

    color:white;

    transform:rotateY(180deg);

    padding:10px;

    text-align:center;

    font-size:16px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.2);
}

/* Disable */

.card.done{
    pointer-events:none;
    cursor:default;
    opacity:0.85;
}

/* Positions */

#card1{top:5px;left:0%;}
#card2{top:5px;left:20%;}
#card3{top:5px;left:38%;}

#card4{top:5px;left:55%;}
#card5{top:40px;left:70%;}
#card6{top:5px;right:0%;}

#card7{bottom:0;left:8%;}
#card8{bottom:0;left:33.3%;}
#card9{bottom:0;left:69.3%;}
</style>
</head>

<body>

<div class="background">
	<div class="image"><img src="scratch.jpg" alt=""></div>

<div class="card" id="card1">
<div class="card-inner">
<div class="card-face card-front">1</div>
<div class="card-face card-back">Nút lệnh chọn ngôn ngữ</div>
</div>
</div>

<div class="card" id="card2">
<div class="card-inner">
<div class="card-face card-front">2</div>
<div class="card-face card-back">Bảng chọn</div>
</div>
</div>

<div class="card" id="card3">
<div class="card-inner">
<div class="card-face card-front">3</div>
<div class="card-face card-back">Nút lệnh cờ xanh</div>
</div>
</div>

<div class="card" id="card4">
<div class="card-inner">
<div class="card-face card-front">4</div>
<div class="card-face card-back">Nút lệnh dừng chương trình</div>
</div>
</div>

<div class="card" id="card5">
<div class="card-inner">
<div class="card-face card-front">5</div>
<div class="card-face card-back">Nhân vật</div>
</div>
</div>

<div class="card" id="card6">
<div class="card-inner">
<div class="card-face card-front">6</div>
<div class="card-face card-back">Sân khấu</div>
</div>
</div>

<div class="card" id="card7">
<div class="card-inner">
<div class="card-face card-front">7</div>
<div class="card-face card-back">Khu vực lệnh</div>
</div>
</div>

<div class="card" id="card8">
<div class="card-inner">
<div class="card-face card-front">8</div>
<div class="card-face card-back">Khu vực chương trình</div>
</div>
</div>

<div class="card" id="card9">
<div class="card-inner">
<div class="card-face card-front">9</div>
<div class="card-face card-back">Khu vực tạo nhân vật và sân khấu</div>
</div>
</div>

</div>

<script>

document.querySelectorAll(".card").forEach(card=>{

    card.addEventListener("click",()=>{

        if(card.classList.contains("done")) return;

        card.classList.add("flipped");

        setTimeout(()=>{
            card.classList.add("done");
        },800);

    });

});

</script>

</body>
</html>
